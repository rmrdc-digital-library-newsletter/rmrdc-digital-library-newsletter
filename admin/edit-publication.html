<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Publication — Admin</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="admin-ui-body">
  <main class="admin-edit-page card">
    <div class="section-head">
      <div>
        <p class="section-tag">Edit Publication</p>
        <h2 id="pageTitle">Edit Publication</h2>
      </div>
      <a class="btn btn-secondary" href="index.html">Back</a>
    </div>

    <form id="editPublicationForm" class="admin-form-stack">
      <input type="hidden" id="pubId" />
      <div class="field"><label for="title">Title</label><input id="title" type="text" required /></div>
      <div class="field"><label for="authors">Author(s)</label><input id="authors" type="text" required /></div>
      <div class="field"><label for="type">Type</label><input id="type" type="text" /></div>
      <div class="field"><label for="year">Year</label><input id="year" type="number" min="1900" max="2100" /></div>
      <div class="field"><label for="isbn">ISBN</label><input id="isbn" type="text" /></div>
      <div class="field"><label for="doi">DOI</label><input id="doi" type="text" /></div>
      <div class="field"><label for="price">Price (₦)</label><input id="price" type="number" min="0" step="0.01" /></div>
      <div class="field"><label><input id="isPaid" type="checkbox" /> Paid publication</label></div>
      <div class="field"><label for="publicationFormat">Publication format</label><select id="publicationFormat"><option value="pdf">PDF</option><option value="html">HTML eBook</option></select></div>
      <div class="field"><label for="previewPageLimit">Preview page limit</label><input id="previewPageLimit" type="number" min="0" /></div>
      <div class="field span-two"><label for="researchAreas">Research Areas</label><input id="researchAreas" type="text" placeholder="cassava, food science" /></div>
      <div class="field span-two"><label for="abstract">Abstract</label><textarea id="abstract" rows="6"></textarea></div>
      <div class="field"><label for="citation">Citation</label><input id="citation" type="text" /></div>

      <hr />
      <div class="field"><label for="cover">Replace Cover Image</label><input id="cover" type="file" accept="image/*" /></div>
      <div class="field" id="currentCover"></div>

      <div id="pdfReplaceSection" class="field"><label for="pdf">Replace PDF (optional)</label><input id="pdf" type="file" accept="application/pdf" /></div>
      <div id="currentPdf" class="field"></div>

      <div id="ebookReplaceSection" class="field"><label for="ebookFolder">Replace HTML eBook folder (optional)</label><input id="ebookFolder" type="file" webkitdirectory directory multiple /></div>
      <div id="currentEbook" class="field"></div>

      <div class="form-actions">
        <button id="saveBtn" class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-secondary" href="index.html">Cancel</a>
      </div>
    </form>

    <p id="editNotice" class="notice hidden"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin.js"></script>
  <script src="js/edit-publication.js"></script>
</body>
</html>
